name: Update Market Data Automation

on:
  schedule:
    - cron: '0 8 * * *'   # S'exécute tous les jours (vérifie l'heure selon ton besoin)
  workflow_dispatch:       # Permet de le lancer manuellement pour tester

jobs:
  update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write       # Autorisation cruciale pour modifier tes fichiers

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git pull origin main --rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run update script
        run: python extract_yfinance.py

      - name: Commit and push changes
        run: |
          # On ajoute tes deux fichiers de données
          git add 10_entreprises_data.csv 
          
          # On ne commit que s'il y a de nouvelles données (évite les erreurs)
          git diff --staged --quiet || (git commit -m "Mise à jour automatique - $(date +'%Y-%m-%d')" && git push origin main)
